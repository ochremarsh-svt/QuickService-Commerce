<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BaryaBites - Product Details</title>
    <link rel="stylesheet" href="assets/css/variables.css">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/item-details.css">
</head>

<body>

    <header class="app-header">
        <div class="logo-container" onclick="window.location.href='index.html'" style="cursor: pointer;">
            <h1>⬅ Back to<span> Menu</span></h1>
        </div>
        <div class="cart-icon-wrapper" onclick="window.location.href='checkout.html'">
            <span class="icon-badge" id="cartCountBadge">0</span>
            <button class="btn-icon">🛒</button>
        </div>
    </header>

    <main class="details-wrapper" id="detailsWrapper">
    </main>

    <script src="assets/js/cart.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Internal Catalog Database Registry Array for all 8 elements
            const productDatabase = {
                "bb-01": {
                    name: "Classic Smash Burger",
                    price: 5.99,
                    desc: "Our signature masterpiece features crispy smashed double beef patties, melted sharp cheddar cheese, house-pickled cucumbers, and secret sauce inside a pillowy brioche roll.",
                    img: "https://images.unsplash.com/photo-1568901346375-23c9450c58cd?q=80&w=600&auto=format&fit=crop",
                    ingredients: "Locally sourced grain-fed organic beef blend, wheat flour composite, pasteurized milk cheese cultures, salt.",
                    allergens: "Contains: Wheat, Gluten, Dairy, and Soy options."
                },
                "bb-02": {
                    name: "Dynamic Falafel Pita",
                    price: 4.50,
                    desc: "Warm loaded pita wrap stuffed with crispy plant falafels, fresh wild field greens, shredded cabbage, and fresh house-made garlic sauce spread.",
                    img: "https://www.madhuseverydayindian.com/wp-content/uploads/2022/01/falafel-pita-sandwich-recipe-with-vegetables-and-tahini-.jpg",
                    ingredients: "Crushed organic chickpeas, parsley, coriander, Mediterranean spices, stone-ground wheat pita.",
                    allergens: "Contains: Sesame extracts, Wheat, Gluten."
                },
                "bb-03": {
                    name: "Sweet Potato Fries",
                    price: 3.25,
                    desc: "Crispy crinkle-cut sweet potatoes tossed heavily in coarse rock salt, freshly cracked black pepper, and rosemary seasoning extracts.",
                    img: "https://images.unsplash.com/photo-1573080496219-bb080dd4f877?q=80&w=600&auto=format&fit=crop",
                    ingredients: "Sweet vine potatoes, refined vegetable oil crisp medium, crushed rock salt flakes, dry rosemary leaves.",
                    allergens: "Prepared inside facilities handling soy products."
                },
                "bb-04": {
                    name: "BBQ Bacon Blast Smash",
                    price: 6.75,
                    desc: "Smashed beef patty layered with caramelized crispy bacon strips, sticky signature hickory glaze, sharp cheddar cheese, and flash-fried onions.",
                    img: "https://images.unsplash.com/photo-1550547660-d9450f859349?q=80&w=600&auto=format&fit=crop",
                    ingredients: "Premium beef, pork bacon cuts, brown sugar reduction sauce, artisan white onions.",
                    allergens: "Contains: Wheat, Dairy, Mustard, Celery vectors."
                },
                "bb-05": {
                    name: "Spicy Jalapeño Crunch",
                    price: 6.25,
                    desc: "Double beef patty combined with melting spicy pepper jack cheese, house pickled hot jalapeño rounds, and smoky chipotle cream aioli.",
                    img: "https://images.unsplash.com/photo-1606755962773-d324e0a13086?q=80&w=600&auto=format&fit=crop",
                    ingredients: "Smashed beef grain, jalapeño chili peppers, pepper-jack whey blend, chipotle paste mix.",
                    allergens: "Contains: High Dairy profiles, Egg emulsifiers."
                },
                "bb-06": {
                    name: "Smoked BBQ Tofu Wrap",
                    price: 4.95,
                    desc: "Crispy brick-pressed organic tofu cubes tossed in a sweet tangy barbecue sauce, with crunchy purple cabbage slaw rolled inside a dynamic flour wrap.",
                    img: "https://images.unsplash.com/photo-1544025162-d76694265947?q=80&w=600&auto=format&fit=crop",
                    ingredients: "Organic soybeans coagulant, vine-ripened tomato extract paste, shredded cabbage blend.",
                    allergens: "Contains: Soy, Wheat wheat options."
                },
                "bb-07": {
                    name: "Loaded Potato Wedges",
                    price: 3.99,
                    desc: "Thick potato wedges baked down till golden brown, generously smothered in a warm, secret dairy-free velvet cheddar cheese sauce.",
                    img: "https://fromthelarder.co.uk/wp-content/uploads/2025/11/Potato-Wedges-10.jpg",
                    ingredients: "Russet starch potatoes, nutritional yeast extract flakes, turmeric powder coloring, coconut oil solids.",
                    allergens: "100% Plant-Based. Nut-Free alternative."
                },
                "bb-08": {
                    name: "Crispy Onion Rings",
                    price: 2.75,
                    desc: "Golden double-breaded sweet white onion rings served alongside a dynamic zesty herb dipping container for maximum flavor output.",
                    img: "https://images.unsplash.com/photo-1534422298391-e4f8c172dddb?q=80&w=600&auto=format&fit=crop",
                    ingredients: "Sweet Spanish white onions, panko breading composite crumbs, light egg washing washes.",
                    allergens: "Contains: Wheat, Gluten, Egg elements."
                }
            };

            // Parsing URL Query Matrix parameters to figure out item ID payload
            const urlParams = new URLSearchParams(window.location.search);
            const activeItemId = urlParams.get('id') || "bb-01"; // Default fall back to main item if unspecified
            const product = productDatabase[activeItemId];

            if (!product) {
                document.getElementById('detailsWrapper').innerHTML = `<h2 style='text-align:center; padding: 4rem; width:100%;'>Specified Product SKU Not Registered.</h2>`;
                return;
            }

            // Injecting standard pristine layout scaffolding with current product metadata context
            document.getElementById('detailsWrapper').innerHTML = `
                <div class="details-img-frame" style="background: url('${product.img}') center/cover;"></div>
                <div class="details-content">
                    <h2>${product.name}</h2>
                    <div class="details-price-tag" id="dynamicPriceDisplay" data-base-price="${product.price}">$${product.price.toFixed(2)}</div>
                    
                    <p class="description">${product.desc}</p>

                    <div class="customizer-box">
                        <div class="customizer-title">Select Optional Toppings</div>
                        <label class="option-row">
                            <div>
                                <input type="checkbox" class="modifier-checkbox" data-addon-price="1.50" id="addonCheese">
                                <span style="margin-left: 0.5rem;">Extra Cheddar Cheese Slice</span>
                            </div>
                            <span style="color: var(--text-muted); font-weight: 600;">+$1.50</span>
                        </label>
                        <label class="option-row">
                            <div>
                                <input type="checkbox" class="modifier-checkbox" data-addon-price="2.00" id="addonBacon">
                                <span style="margin-left: 0.5rem;">Crispy Premium Bacon Strips</span>
                            </div>
                            <span style="color: var(--text-muted); font-weight: 600;">+$2.00</span>
                        </label>
                    </div>

                    <div class="customizer-title">Select Quantity</div>
                    <div class="quantity-selector-container">
                        <button class="qty-btn" id="btnDecrement">-</button>
                        <div class="qty-display" id="itemQuantityDisplay">1</div>
                        <button class="qty-btn" id="btnIncrement">+</button>
                    </div>

                    <button class="btn-checkout-submit" style="background-color: var(--primary);" id="btnDetailsAddToCart">
                        Add to Basket • <span id="btnTotalProjection">$${product.price.toFixed(2)}</span>
                    </button>

                    <div class="tabs-header">
                        <button class="tab-trigger active" data-tab-target="tab-ingredients">Ingredients</button>
                        <button class="tab-trigger" data-tab-target="tab-nutrition">Allergens</button>
                    </div>
                    
                    <div class="tab-panel active" id="tab-ingredients">${product.ingredients}</div>
                    <div class="tab-panel" id="tab-nutrition">${product.allergens}</div>
                </div>
            `;

            // Re-instantiating state interaction events for freshly generated markup injection layer
            const priceDisplay = document.getElementById('dynamicPriceDisplay');
            const projectionDisplay = document.getElementById('btnTotalProjection');
            const qtyDisplay = document.getElementById('itemQuantityDisplay');
            const checkboxes = document.querySelectorAll('.modifier-checkbox');

            const basePrice = product.price;
            let currentQuantity = 1;

            function recalculateTotals() {
                let addonTotal = 0;
                checkboxes.forEach(box => {
                    if (box.checked) addonTotal += parseFloat(box.getAttribute('data-addon-price'));
                });

                const unitCost = basePrice + addonTotal;
                const grandTotal = unitCost * currentQuantity;

                priceDisplay.textContent = `$${unitCost.toFixed(2)}`;
                projectionDisplay.textContent = `$${grandTotal.toFixed(2)}`;
            }

            document.getElementById('btnIncrement').addEventListener('click', () => {
                currentQuantity++;
                qtyDisplay.textContent = currentQuantity;
                recalculateTotals();
            });

            document.getElementById('btnDecrement').addEventListener('click', () => {
                if (currentQuantity > 1) {
                    currentQuantity--;
                    qtyDisplay.textContent = currentQuantity;
                    recalculateTotals();
                }
            });

            checkboxes.forEach(box => box.addEventListener('change', recalculateTotals));

            document.getElementById('btnDetailsAddToCart').addEventListener('click', () => {
                if (!window.BaryaCart) return;

                let descriptiveModifiers = [];
                checkboxes.forEach(box => {
                    if (box.checked) descriptiveModifiers.push(box.parentNode.textContent.trim());
                });

                const structuralNameString = descriptiveModifiers.length > 0
                    ? `${product.name} (${descriptiveModifiers.join(', ')})`
                    : product.name;

                let finalUnitCost = basePrice;
                checkboxes.forEach(box => {
                    if (box.checked) finalUnitCost += parseFloat(box.getAttribute('data-addon-price'));
                });

                const lineItemPayload = {
                    id: `${activeItemId}-custom-${Date.now()}`,
                    name: structuralNameString,
                    price: finalUnitCost,
                    quantity: currentQuantity
                };

                window.BaryaCart.addItem(lineItemPayload);

                const btn = document.getElementById('btnDetailsAddToCart');
                const nativeText = btn.innerHTML;
                btn.innerHTML = "Successfully Added! ✔";
                btn.style.backgroundColor = "var(--secondary)";
                setTimeout(() => {
                    btn.innerHTML = nativeText;
                    btn.style.backgroundColor = "var(--primary)";
                }, 1200);
            });

            // Tab interface toggle mappings loop logic execution setup
            const triggers = document.querySelectorAll('.tab-trigger');
            const panels = document.querySelectorAll('.tab-panel');

            triggers.forEach(trigger => {
                trigger.addEventListener('click', (e) => {
                    triggers.forEach(t => t.classList.remove('active'));
                    panels.forEach(p => p.classList.remove('active'));

                    e.currentTarget.classList.add('active');
                    const targetId = e.currentTarget.getAttribute('data-tab-target');
                    document.getElementById(targetId).classList.add('active');
                });
            });
        });
    </script>
</body>

</html>
